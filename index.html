<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Streaming Pro Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<header class="header">
  <h1>💎 Streaming Pro Center</h1>
  <p>Distribución mayorista · ⚡ Activación inmediata</p>

  <div class="header-actions">
    <a href="https://wa.me/12494792518" class="cta">💸 Comprar ahora</a>
    <button id="btnAdmin">🔐 Admin</button>
  </div>
</header>

<section class="urgencia">⏳ Alta demanda hoy — Stock limitado</section>

<section id="catalogo"></section>

</div>

<div id="noti-container"></div>

<script src="public.js"></script>

<script>
// 🔔 NOTIFICACIONES PRO
const nombres=["Juan","Carlos","Luis","Ana","Sofía"];
const productos=["Netflix","Spotify","Disney+"];

setInterval(()=>{
  const div=document.createElement("div");
  const t=Math.floor(Math.random()*5)+1;
  div.className="noti";
  div.innerHTML=`💸 <b>${nombres[Math.random()*nombres.length|0]}</b> compró ${productos[Math.random()*productos.length|0]}<br><small>hace ${t} min</small>`;
  document.getElementById("noti-container").appendChild(div);
  setTimeout(()=>div.remove(),4000);
},5000);
</script>

</body>
</html>
