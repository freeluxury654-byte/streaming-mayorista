<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Streaming Pro Center · Mayorista</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="style.css" />

  <!-- Animaciones -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>
<div id="app">

  <!-- HEADER -->
  <header class="header" data-aos="fade-down">
    <div class="header-content">
      <h1>💎 Streaming Pro Center</h1>
      <p class="subtitle">
        Distribución mayorista · ⚡ Activación inmediata · 💸 Negocio escalable
      </p>

      <div class="badges">
        <span>✅ Verificado</span>
        <span>🔒 Garantía</span>
        <span>📦 Stock real</span>
        <span>⚡ Entrega inmediata</span>
      </div>

      <div class="header-actions">
        <a class="cta pulse" href="https://wa.me/12494792518" target="_blank">
          💬 Comprar ahora
        </a>
        <button id="btnEditor" class="editor-btn">🔐 Admin</button>
        <button id="btnDarkMode" class="editor-btn">🌙</button>
      </div>
    </div>
  </header>

  <!-- URGENCIA -->
  <section class="urgencia">
    ⏳ Alta demanda hoy — Stock limitado disponible
  </section>

  <!-- CATÁLOGO -->
  <section id="catalogo"></section>

  <!-- FOOTER -->
  <footer>
    <p>⚡ Plataforma automatizada de distribución digital</p>
  </footer>

</div>

<!-- 🔔 NOTIFICACIONES -->
<div id="noti-container"></div>

<!-- 📲 BOTÓN WHATSAPP -->
<a href="https://wa.me/12494792518" class="whatsapp-float" target="_blank">
  💬
</a>

<script src="public.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init({ duration: 800, once: true });

// 🌙 Dark mode
const btnDarkMode = document.getElementById("btnDarkMode");
if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark-mode");
}

btnDarkMode.onclick = () => {
  document.body.classList.toggle("dark-mode");
  localStorage.setItem("theme",
    document.body.classList.contains("dark-mode") ? "dark" : "light"
  );
};

// 🔥 Notificaciones falsas
const nombres = ["Juan","Carlos","Luis","Ana","Sofía","Miguel"];
const productos = ["Netflix","Spotify","Disney+","HBO"];

function crearNoti() {
  const div = document.createElement("div");
  div.className = "noti";

  const n = nombres[Math.floor(Math.random()*nombres.length)];
  const p = productos[Math.floor(Math.random()*productos.length)];

  div.innerHTML = `💸 <b>${n}</b> compró ${p}`;

  document.getElementById("noti-container").appendChild(div);

  setTimeout(()=>div.remove(),4000);
}

setInterval(crearNoti,5000);
</script>

</body>
</html>
