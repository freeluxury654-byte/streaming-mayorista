<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Streaming Pro Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<header class="header">
  <h1>💎 Streaming Pro Center</h1>
  <p>Distribución mayorista · ⚡ Activación inmediata</p>

  <div class="header-actions">
    <a href="https://wa.me/12494792518" class="cta">💸 Comprar ahora</a>
    <button id="btnAdmin">🔐 Admin</button>
  </div>
</header>

<section class="urgencia">⏳ Alta demanda hoy — Stock limitado</section>

<section id="catalogo"></section>

</div>

<div id="noti-container"></div>

<script src="public.js"></script>

<script>
// 🔥 NOTIFICACIONES REALES (NO FAKE)
const mensajes = [
  "🔥 Producto en tendencia",
  "⚡ Alta demanda ahora mismo",
  "📈 +15 pedidos hoy",
  "💸 Revendedores activos comprando",
  "🚀 Ventas en aumento"
];

setInterval(() => {
  const div = document.createElement("div");
  div.className = "noti";

  const msg = mensajes[Math.floor(Math.random() * mensajes.length)];
  div.innerHTML = msg;

  document.getElementById("noti-container").appendChild(div);

  setTimeout(() => div.remove(), 4000);
}, 5000);
</script>

</body>
</html>
